name: Quality

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5.0.0

      - name: Check README badge block
        run: python3 tools/update_readme_badges.py --check

      - name: Run repo quality lane
        run: |
          ./gradlew --no-daemon :android:testDebugUnitTest
          ./gradlew --no-daemon :core:test
          ./gradlew --no-daemon :core:runBattleMonteCarlo -Pruns=60 -Pwaves=1 -Pseconds=48 -Pstep=0.05 -Pseed=20260411
