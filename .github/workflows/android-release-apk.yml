name: Build Android Release APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Print app identity
        run: ./gradlew --no-daemon :android:printAppIdentity :android:printReleaseSigningSource

      - name: Build local APK artifact
        run: ./gradlew --no-daemon :android:assembleLocal

      - name: Upload local APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-local-apk
          path: android/build/outputs/apk/local/*.apk
          if-no-files-found: error
